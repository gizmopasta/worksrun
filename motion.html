<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVER WORKS — Motion Study v1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
  color: #fff;
  padding: 40px;
  min-width: 1300px;
}
.header {
  display: flex; align-items: center; gap: 20px;
  border: 1px solid #2e2e2e; padding: 20px 28px; margin-bottom: 48px;
}
.header h1 { font-size: 10px; letter-spacing: 0.4em; color: #aaa; text-transform: uppercase; }
.vtag { font-size: 9px; letter-spacing: 0.2em; color: #00C85F; border: 1px solid #00C85F; padding: 2px 8px; }
.specs { display: flex; gap: 20px; margin-left: auto; }
.spec { font-size: 9px; letter-spacing: 0.12em; color: #555; text-transform: uppercase; }
.spec span { color: #aaa; margin-left: 5px; }

.section { margin-bottom: 60px; }
.sec-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.sec-id { font-size: 22px; color: #2a2a2a; font-weight: bold; }
.sec-name { font-size: 11px; letter-spacing: 0.25em; color: #aaa; text-transform: uppercase; }
.sec-motion { font-size: 9px; letter-spacing: 0.15em; color: #00C85F; border: 1px solid rgba(0,200,95,0.35); padding: 2px 8px; }
.divider { height: 1px; background: #1e1e1e; margin-bottom: 16px; }

.card { margin-bottom: 16px; }
.card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.card-id { font-size: 10px; letter-spacing: 0.2em; color: #888; }
.card-bg { font-size: 9px; letter-spacing: 0.12em; padding: 2px 8px; border: 1px solid #333; color: #666; }

.canvas-wrap {
  position: relative; display: inline-block; cursor: pointer;
}
canvas { display: block; width: 1200px; height: 675px; }

.overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 14px; background: rgba(0,0,0,0.7);
  display: flex; gap: 14px; align-items: center; pointer-events: none;
}
.oi { font-size: 8px; letter-spacing: 0.15em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
.oi span { color: rgba(255,255,255,0.85); margin-left: 4px; }
.od { width: 1px; height: 8px; background: rgba(255,255,255,0.12); }

.play-btn {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(0,200,95,0.92); border: none;
  cursor: pointer; font-size: 18px; color: #000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.3s, transform 0.2s;
  z-index: 10;
}
.play-btn:hover { transform: translate(-50%,-50%) scale(1.08); }
.canvas-wrap.playing .play-btn { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <h1>NAVER WORKS — Motion Study</h1>
  <div class="vtag">v1 · 5sec</div>
  <div class="specs">
    <div class="spec">Duration<span>5s</span></div>
    <div class="spec">Start/End<span>단색</span></div>
    <div class="spec">Format<span>1200×675</span></div>
    <div class="spec">Click<span>▶ to play</span></div>
  </div>
</div>

<script>
const C = {
  white:'#FFFFFF', navy1:'#F0F5FA',
  green:'#00C85F', blue:'#008CFF',
  purple:'#4757FF', navy2:'#202936'
};
const COLS = Object.values(C);

function mkRand(seed) {
  let s = (seed>>>0)||1;
  return ()=>{ s=(Math.imul(1664525,s)+1013904223)>>>0; return s/0x100000000; };
}

function easeOut(t) { return 1-Math.pow(1-t,3); }
function easeInOut(t) { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function easeInExpo(t) { return t===0?0:Math.pow(2,10*t-10); }

// ── 선 생성 ──────────────────────────────
function ensureColors(lines, rand) {
  const used = new Set(lines.map(l=>l.color));
  COLS.forEach(col=>{
    if(!used.has(col)){
      let mi=0; lines.forEach((l,i)=>{ if(l.w<lines[mi].w) mi=i; });
      lines[mi].color=col; used.add(col);
    }
  });
  return lines;
}

function injectJumboC(lines,W,seed,r2=0.68){
  const rand=mkRand(seed+77777);
  const jW=W*(0.30+rand()*0.05), sW=jW*r2;
  const jc=[C.blue,C.green], jCol=jc[Math.floor(rand()*2)];
  const sCol=jCol===C.blue?C.green:C.blue;
  const s=[...lines].map((l,i)=>({...l,i})).sort((a,b)=>b.w-a.w);
  lines[s[0].i]={...lines[s[0].i],w:jW,color:jCol};
  if(s[1]) lines[s[1].i]={...lines[s[1].i],w:sW,color:sCol};
  return lines;
}

function injectJumboE(lines,W,seed,pos,r=0.40){
  const rand=mkRand(seed+77777);
  const jW=W*r, sW=jW*0.68;
  const jc=[C.blue,C.green], jCol=jc[Math.floor(rand()*2)];
  const sCol=jCol===C.blue?C.green:C.blue;
  const jX=pos===0?jW/2:W-jW/2;
  const s=[...lines].map((l,i)=>({...l,i})).sort((a,b)=>b.w-a.w);
  lines[s[0].i]={x:jX,w:jW,color:jCol};
  if(s[1]) lines[s[1].i]={...lines[s[1].i],w:sW,color:sCol};
  return lines;
}

function makeChaos(W,s){ const r=mkRand(s),ls=[]; let x=0;
  while(x<W+200){ const w=0.5+Math.pow(r(),3)*120; ls.push({x:x+w/2,w,color:COLS[Math.floor(r()*COLS.length)]}); x+=w+r()*40; }
  injectJumboC(ls,W,s); return ensureColors(ls,mkRand(s+1)); }

function makeFocal(W,s){ const r=mkRand(s),ls=[]; let x=0;
  while(x<W+60){ const d=Math.min(1,Math.abs((x/W)-0.5)*2); const mW=Math.max(0,300*(1-Math.pow(d,0.8))); const w=Math.max(0.5,0.5+Math.pow(1-r(),2)*mW);
    ls.push({x:x+w/2,w,color:COLS[Math.floor(r()*COLS.length)]}); x+=w+0.5+r()*3; }
  injectJumboC(ls,W,s); return ensureColors(ls,mkRand(s+1)); }

function makeAntiFocal(W,s){ const r=mkRand(s),ls=[]; let x=0;
  while(x<W+60){ const d=Math.min(1,Math.abs((x/W)-0.5)*2); const mW=Math.max(0,300*Math.pow(d,1.2)); const w=Math.max(0.5,0.5+Math.pow(1-r(),1.4)*mW);
    ls.push({x:x+w/2,w,color:COLS[Math.floor(r()*COLS.length)]}); x+=w+0.5+d*28+r()*4; }
  injectJumboC(ls,W,s); return ensureColors(ls,mkRand(s+1)); }

function makeL2R(W,s){ const r=mkRand(s),ls=[]; let x=0;
  while(x<W+60){ const t=Math.min(1,x/W); const mW=Math.max(0,200*Math.pow(t,1.5)); const w=Math.max(0.5,0.5+Math.pow(1-r(),1.8)*mW);
    ls.push({x:x+w/2,w,color:COLS[Math.floor(r()*COLS.length)]}); x+=w+0.5+t*28+r()*4; }
  injectJumboE(ls,W,s,1,0.40); return ensureColors(ls,mkRand(s+1)); }

function makeR2L(W,s){ const r=mkRand(s),ls=[]; let x=0;
  while(x<W+60){ const t=Math.min(1,x/W); const mW=Math.max(0,200*Math.pow(1-t,1.5)); const w=Math.max(0.5,0.5+Math.pow(1-r(),1.8)*mW);
    ls.push({x:x+w/2,w,color:COLS[Math.floor(r()*COLS.length)]}); x+=w+0.5+(1-t)*28+r()*4; }
  injectJumboE(ls,W,s,0,0.40); return ensureColors(ls,mkRand(s+1)); }

function makeSolid(W,s,t1,t2){ const r=mkRand(s);
  const cols=['#00C85F','#008CFF','#4757FF','#202936','#FFFFFF','#F0F5FA'];
  const sh=[...cols]; for(let i=sh.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
  const jc=['#00C85F','#008CFF','#202936'], jCol=jc[Math.floor(r()*jc.length)], ji=sh.indexOf(jCol);
  const nj=sh.map((_,i)=>i).filter(i=>i!==ji);
  for(let k=nj.length-1;k>0;k--){const j=Math.floor(r()*(k+1));[nj[k],nj[j]]=[nj[j],nj[k]];}
  const ws=new Array(6).fill(0);
  ws[ji]=W*0.35; ws[nj[0]]=W*t1; ws[nj[1]]=W*t2;
  const used=ws[ji]+ws[nj[0]]+ws[nj[1]]; const rem=(W-used)/3;
  ws[nj[2]]=rem*(0.85+r()*0.3); ws[nj[3]]=rem*(0.85+r()*0.3); ws[nj[4]]=rem*(0.85+r()*0.3);
  const tot=ws.reduce((a,b)=>a+b,0); const fw=ws.map(w=>(w/tot)*W);
  const ls=[]; let x=0; sh.forEach((color,i)=>{ ls.push({x:x+fw[i]/2,w:fw[i],color}); x+=fw[i]; });
  return ls; }

// ── 모션 프레임 렌더 ──────────────────────
function drawFrame(ctx,W,H,bgHex,lines,p,motion) {
  ctx.fillStyle=bgHex; ctx.fillRect(0,0,W,H);
  if(p<=0||p>=1) return;

  lines.forEach((line,i)=>{
    const {x,w,color}=line; let dw=0;

    if(motion==='grow'){
      const delay=(i/lines.length)*0.25;
      const lp=Math.max(0,Math.min(1,(p-delay)/(1-delay)));
      dw=w*easeOut(lp);

    } else if(motion==='center-out'){
      const dist=Math.abs(x/W-0.5)*2;
      const appear=Math.max(0,Math.min(1,(p-dist*0.4)/0.6));
      dw=w*easeOut(appear);

    } else if(motion==='outside-in'){
      const edgeDist=1-Math.abs(x/W-0.5)*2;
      const appear=Math.max(0,Math.min(1,(p-edgeDist*0.4)/0.6));
      dw=w*easeOut(appear);

    } else if(motion==='side-lr'){
      const appear=Math.max(0,Math.min(1,(p-(x/W)*0.4)/0.6));
      dw=w*easeOut(appear);

    } else if(motion==='side-rl'){
      const rx=1-x/W;
      const appear=Math.max(0,Math.min(1,(p-rx*0.4)/0.6));
      dw=w*easeOut(appear);

    } else if(motion==='stagger'){
      const delay=(i/lines.length)*0.7;
      const appear=Math.max(0,Math.min(1,(p-delay)/0.3));
      dw=w*easeOut(appear);
    } else if(motion==='slide-up'){
      // 각 선이 아래서 위로 슬라이드하며 등장 (시간차)
      const delay=(i/lines.length)*0.3;
      const lp=Math.max(0,Math.min(1,(p-delay)/(1-delay)));
      dw=w;
      const ep=easeOut(lp);
      const slideY=H*(1-ep); // 아래서 위로
      if(ep>0){
        ctx.save();
        ctx.beginPath();
        ctx.rect(Math.round(x-dw/2),0,Math.max(1,Math.ceil(dw)),H);
        ctx.clip();
        ctx.fillStyle=color;
        ctx.fillRect(Math.round(x-dw/2),slideY,Math.max(1,Math.ceil(dw)),H);
        ctx.restore();
      }
      return; // fillRect 아래에서 하지 않도록
    }

    if(dw>0 && motion!=='slide-up'){
      ctx.fillStyle=color;
      ctx.fillRect(Math.round(x-dw/2),0,Math.max(1,Math.ceil(dw)),H);
    }
  });
}

// ── 애니메이션 실행 ───────────────────────
function startAnim(canvasId, bgHex, lines, motion) {
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const wrap=canvas.closest('.canvas-wrap');
  const TOTAL=5000, FADE_IN=600, FADE_OUT=600;

  let raf=null, t0=null;

  function tick(ts) {
    if(!t0) t0=ts;
    const el=ts-t0;

    if(el<FADE_IN) {
      // 배경
      ctx.fillStyle=bgHex; ctx.fillRect(0,0,W,H);
    } else if(el<TOTAL-FADE_OUT) {
      // 그래픽 등장
      const p=(el-FADE_IN)/(TOTAL-FADE_IN-FADE_OUT);
      drawFrame(ctx,W,H,bgHex,lines,Math.min(p,0.999),motion);
    } else {
      // 마지막: 그래픽 상태 유지
      drawFrame(ctx,W,H,bgHex,lines,0.999,motion);
      wrap.classList.remove('playing');
      return;
    }
    raf=requestAnimationFrame(tick);
  }

  wrap.classList.add('playing');
  raf=requestAnimationFrame(tick);
}

// ── 초기 배경 그리기 ─────────────────────
function initCanvas(canvasId, bgHex) {
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=bgHex; ctx.fillRect(0,0,canvas.width,canvas.height);
}

function fixColor(col,bgKey) {
  if(bgKey==='white'&&(col===C.white||col===C.navy1)) return C.navy2;
  if(bgKey==='navy'&&col===C.navy2) return C.purple;
  return col;
}

// ── 타입 정의 ────────────────────────────
const TYPES = [
  { id:'2',  name:'Chaos',      motion:'slide-up',   motionLabel:'Slide Up',       makeFn:makeChaos,     seed:2001,
    bgs:[{key:'white',hex:'#FFFFFF'},{key:'navy',hex:'#202936'}] },
  { id:'3',  name:'Focal',      motion:'center-out', motionLabel:'Center-Out', makeFn:makeFocal,     seed:3001,
    bgs:[{key:'white',hex:'#FFFFFF'},{key:'navy',hex:'#202936'}] },
  { id:'3b', name:'Anti-Focal', motion:'outside-in', motionLabel:'Outside-In', makeFn:makeAntiFocal, seed:7001,
    bgs:[{key:'white',hex:'#FFFFFF'},{key:'navy',hex:'#202936'}] },
  { id:'4a', name:'L→R',        motion:'side-lr',    motionLabel:'Side L→R',   makeFn:makeL2R,       seed:8001,
    bgs:[{key:'white',hex:'#FFFFFF'},{key:'navy',hex:'#202936'}] },
  { id:'4b', name:'R→L',        motion:'side-rl',    motionLabel:'Side R→L',   makeFn:makeR2L,       seed:9001,
    bgs:[{key:'white',hex:'#FFFFFF'},{key:'navy',hex:'#202936'}] },
  { id:'5a', name:'Solid-A',    motion:'side-lr',    motionLabel:'Side L→R',    makeFn:(W,s)=>makeSolid(W,s,0.05,0.10), seed:5001,
    bgs:[{key:'solid',hex:'#FFFFFF'}], solid:true },
  { id:'5b', name:'Solid-B',    motion:'center-out', motionLabel:'Center-Out',    makeFn:(W,s)=>makeSolid(W,s+3333,0.07,0.15), seed:5001,
    bgs:[{key:'solid',hex:'#FFFFFF'}], solid:true },
  { id:'5c', name:'Solid-C',    motion:'outside-in', motionLabel:'Outside-In',    makeFn:(W,s)=>makeSolid(W,s+7777,0.10,0.20), seed:5001,
    bgs:[{key:'solid',hex:'#FFFFFF'}], solid:true },
];

// ── DOM 생성 ─────────────────────────────
TYPES.forEach(type => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="sec-head">
      <div class="sec-id">T${type.id}</div>
      <div class="sec-name">${type.name}</div>
      <div class="sec-motion">${type.motionLabel}</div>
    </div>
    <div class="divider"></div>
  `;

  type.bgs.forEach((bg, bi) => {
    const cid = `M${type.id}_${bi+1}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-meta">
        <div class="card-id">${cid} · ${type.name}</div>
        <div class="card-bg">BG · ${bg.hex}</div>
      </div>
      <div class="canvas-wrap" id="wrap_${cid}">
        <canvas id="${cid}" width="1200" height="675"></canvas>
        <div class="overlay">
          <div class="oi">Motion<span>${type.motionLabel}</span></div>
          <div class="od"></div>
          <div class="oi">5s</div>
          <div class="od"></div>
          <div class="oi">BG<span>${bg.hex}</span></div>
        </div>
        <button class="play-btn" id="btn_${cid}">▶</button>
      </div>
    `;
    sec.appendChild(card);

    // 초기화 + 이벤트
    setTimeout(() => {
      initCanvas(cid, bg.hex);
      const lines = type.solid
        ? type.makeFn(1200, type.seed)
        : type.makeFn(1200, type.seed).map(l=>({...l,color:fixColor(l.color,bg.key)}));

      const btn = document.getElementById(`btn_${cid}`);
      const wrap = document.getElementById(`wrap_${cid}`);

      function play() {
        if(wrap.classList.contains('playing')) return;
        startAnim(cid, bg.hex, lines, type.motion);
      }

      btn.addEventListener('click', e => { e.stopPropagation(); play(); });
      wrap.addEventListener('click', play);
    }, 50 + bi * 30);
  });

  document.body.appendChild(sec);
});
</script>
</body>
</html>
