<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVER WORKS — Motion Study v1</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    color: #fff;
    padding: 40px 40px 80px;
    min-width: 1320px;
  }
  .top-header {
    border: 1px solid #2e2e2e;
    padding: 24px 32px;
    margin-bottom: 48px;
    display: flex;
    align-items: baseline;
    gap: 32px;
  }
  .top-header h1 { font-size: 10px; letter-spacing: 0.4em; color: #aaa; text-transform: uppercase; }
  .version-tag {
    font-size: 9px; letter-spacing: 0.2em; color: #00C85F;
    border: 1px solid #00C85F; padding: 2px 8px;
  }
  .spec-list { display: flex; gap: 24px; flex-wrap: wrap; margin-left: auto; }
  .spec-item { font-size: 9px; letter-spacing: 0.15em; color: #555; text-transform: uppercase; }
  .spec-item span { color: #aaa; margin-left: 6px; }

  .section { margin-bottom: 64px; }
  .section-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .section-id { font-size: 24px; color: #2a2a2a; font-weight: bold; }
  .section-title { font-size: 11px; letter-spacing: 0.25em; color: #aaa; text-transform: uppercase; }
  .section-motion { font-size: 9px; letter-spacing: 0.18em; color: #00C85F; border: 1px solid rgba(0,200,95,0.3); padding: 2px 8px; }
  .section-divider { height: 1px; background: #1e1e1e; margin-bottom: 16px; }

  .card { position: relative; margin-bottom: 16px; }
  .card-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
  .card-id { font-size: 11px; letter-spacing: 0.25em; color: #aaa; }
  .card-bg { font-size: 9px; letter-spacing: 0.15em; padding: 2px 8px; border: 1px solid #444; color: #777; text-transform: uppercase; }

  .canvas-wrap { position: relative; cursor: pointer; }
  canvas { display: block; width: 1200px; height: 675px; }

  .canvas-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 16px; background: rgba(0,0,0,0.72);
    display: flex; gap: 16px; align-items: center;
  }
  .ov-item { font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .ov-item span { color: rgba(255,255,255,0.9); margin-left: 5px; }
  .ov-div { width: 1px; height: 10px; background: rgba(255,255,255,0.15); }

  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(0,200,95,0.9); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; transition: opacity 0.2s;
  }
  .play-btn:hover { background: #00C85F; }
  .canvas-wrap.playing .play-btn { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div class="top-header">
  <h1>NAVER WORKS — Motion Study</h1>
  <div class="version-tag">v1 · 5sec Motion</div>
  <div class="spec-list">
    <div class="spec-item">Duration<span>5s</span></div>
    <div class="spec-item">Start/End<span>단색 배경</span></div>
    <div class="spec-item">Format<span>1200×675 · 16:9</span></div>
    <div class="spec-item">FPS<span>60</span></div>
  </div>
</div>

<script>
// ── 컬러 ──────────────────────────────────
const C = {
  white:  '#FFFFFF', navy1: '#F0F5FA',
  green:  '#00C85F', blue:  '#008CFF',
  purple: '#4757FF', navy2: '#202936',
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function mkRand(seed) {
  let s = (seed >>> 0) || 1;
  return () => { s = (Math.imul(1664525,s)+1013904223)>>>0; return s/0x100000000; };
}

// ── easing ────────────────────────────────
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}
function easeOutExpo(t) {
  return t === 1 ? 1 : 1 - Math.pow(2, -10*t);
}
function easeInExpo(t) {
  return t === 0 ? 0 : Math.pow(2, 10*t - 10);
}

// ── 선 생성 함수들 ────────────────────────
function ensureAllColors(lines, rand) {
  const allCols = [C.green,C.blue,C.purple,C.navy2,C.white,C.navy1];
  const used = new Set(lines.map(l=>l.color));
  allCols.forEach(col=>{
    if(!used.has(col)){
      let minIdx=0;
      lines.forEach((l,i)=>{ if(l.w<lines[minIdx].w) minIdx=i; });
      lines[minIdx].color=col; used.add(col);
    }
  });
  return lines;
}

function injectJumboCenter(lines,W,seed,secondRatio=0.68){
  const rand=mkRand(seed+77777);
  const jumboW=W*(0.30+rand()*0.05);
  const secondW=jumboW*secondRatio;
  const jc=[C.blue,C.green];
  const jCol=jc[Math.floor(rand()*2)];
  const sCol=jCol===C.blue?C.green:C.blue;
  const sorted=lines.map((l,i)=>({...l,i})).sort((a,b)=>b.w-a.w);
  lines[sorted[0].i]={...lines[sorted[0].i],w:jumboW,color:jCol};
  if(sorted[1]) lines[sorted[1].i]={...lines[sorted[1].i],w:secondW,color:sCol};
  return lines;
}

function injectJumboEdge(lines,W,seed,pos,ratio=0.40){
  const rand=mkRand(seed+77777);
  const jumboW=W*ratio;
  const secondW=jumboW*0.68;
  const jc=[C.blue,C.green];
  const jCol=jc[Math.floor(rand()*2)];
  const sCol=jCol===C.blue?C.green:C.blue;
  const jumboX=pos===0?jumboW/2:W-jumboW/2;
  const sorted=lines.map((l,i)=>({...l,i})).sort((a,b)=>b.w-a.w);
  lines[sorted[0].i]={x:jumboX,w:jumboW,color:jCol};
  if(sorted[1]) lines[sorted[1].i]={...lines[sorted[1].i],w:secondW,color:sCol};
  return lines;
}

function makeChaos(W,seed){
  const rand=mkRand(seed); const cols=Object.values(C); const lines=[];
  let x=0;
  while(x<W+200){
    const w=0.5+Math.pow(rand(),3)*120;
    lines.push({x:x+w/2,w,color:cols[Math.floor(rand()*cols.length)]});
    x+=w+rand()*40;
  }
  injectJumboCenter(lines,W,seed);
  return ensureAllColors(lines,mkRand(seed+1));
}

function makeFocal(W,seed){
  const rand=mkRand(seed); const cols=Object.values(C); const lines=[];
  let x=0;
  while(x<W+60){
    const dist=Math.min(1,Math.abs((x/W)-0.5)*2);
    const maxW=Math.max(0,300*(1-Math.pow(dist,0.8)));
    const w=Math.max(0.5,0.5+Math.pow(1-rand(),2.0)*maxW);
    lines.push({x:x+w/2,w,color:cols[Math.floor(rand()*cols.length)]});
    x+=w+0.5+rand()*3;
  }
  injectJumboCenter(lines,W,seed);
  return ensureAllColors(lines,mkRand(seed+1));
}

function makeAntiFocal(W,seed){
  const rand=mkRand(seed); const cols=Object.values(C); const lines=[];
  let x=0;
  while(x<W+60){
    const dist=Math.min(1,Math.abs((x/W)-0.5)*2);
    const maxW=Math.max(0,300*Math.pow(dist,1.2));
    const w=Math.max(0.5,0.5+Math.pow(1-rand(),1.4)*maxW);
    lines.push({x:x+w/2,w,color:cols[Math.floor(rand()*cols.length)]});
    const gap=0.5+dist*28+rand()*4;
    x+=w+gap;
  }
  injectJumboCenter(lines,W,seed);
  return ensureAllColors(lines,mkRand(seed+1));
}

function makeL2R(W,seed){
  const rand=mkRand(seed); const cols=Object.values(C); const lines=[];
  let x=0;
  while(x<W+60){
    const t=Math.min(1,x/W);
    const maxW=Math.max(0,200*Math.pow(t,1.5));
    const w=Math.max(0.5,0.5+Math.pow(1-rand(),1.8)*maxW);
    lines.push({x:x+w/2,w,color:cols[Math.floor(rand()*cols.length)]});
    x+=w+0.5+t*28+rand()*4;
  }
  injectJumboEdge(lines,W,seed,1,0.40);
  return ensureAllColors(lines,mkRand(seed+1));
}

function makeR2L(W,seed){
  const rand=mkRand(seed); const cols=Object.values(C); const lines=[];
  let x=0;
  while(x<W+60){
    const t=Math.min(1,x/W);
    const maxW=Math.max(0,200*Math.pow(1-t,1.5));
    const w=Math.max(0.5,0.5+Math.pow(1-rand(),1.8)*maxW);
    lines.push({x:x+w/2,w,color:cols[Math.floor(rand()*cols.length)]});
    x+=w+0.5+(1-t)*28+rand()*4;
  }
  injectJumboEdge(lines,W,seed,0,0.40);
  return ensureAllColors(lines,mkRand(seed+1));
}

function makeSolid6Base(W,seed,thin1R,thin2R){
  const rand=mkRand(seed);
  const cols=['#00C85F','#008CFF','#4757FF','#202936','#FFFFFF','#F0F5FA'];
  const shuffled=[...cols];
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(rand()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }
  const jc=['#00C85F','#008CFF','#202936'];
  const jCol=jc[Math.floor(rand()*jc.length)];
  const ji=shuffled.indexOf(jCol);
  const nj=shuffled.map((_,i)=>i).filter(i=>i!==ji);
  for(let k=nj.length-1;k>0;k--){const j=Math.floor(rand()*(k+1));[nj[k],nj[j]]=[nj[j],nj[k]];}
  const widths=new Array(6).fill(0);
  widths[ji]=W*0.35; widths[nj[0]]=W*thin1R; widths[nj[1]]=W*thin2R;
  const used=widths[ji]+widths[nj[0]]+widths[nj[1]];
  const rem=(W-used)/3;
  widths[nj[2]]=rem*(0.85+rand()*0.3);
  widths[nj[3]]=rem*(0.85+rand()*0.3);
  widths[nj[4]]=rem*(0.85+rand()*0.3);
  const total=widths.reduce((a,b)=>a+b,0);
  const fw=widths.map(w=>(w/total)*W);
  const lines=[]; let x=0;
  shuffled.forEach((color,i)=>{
    lines.push({x:x+fw[i]/2,w:fw[i],color}); x+=fw[i];
  });
  return lines;
}

// ── 모션 렌더러 ───────────────────────────
// progress: 0~1
// type: 'grow' | 'center-out' | 'outside-in' | 'side-in-lr' | 'side-in-rl' | 'stagger'

function renderFrame(ctx, W, H, bgColor, lines, progress, motionType) {
  const p = easeInOutCubic(progress);

  // 배경
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,W,H);

  if(progress <= 0) return;
  if(progress >= 1){ // 끝 프레임: 배경만
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,W,H);
    return;
  }

  lines.forEach((line, i) => {
    const {x, w, color} = line;
    let drawW = 0;
    let drawX = x;

    if(motionType === 'grow') {
      // 각 선이 제자리에서 너비 0→max, 시간차
      const delay = (i / lines.length) * 0.3;
      const lp = Math.max(0, Math.min(1, (p - delay) / (1 - delay)));
      drawW = w * easeOutExpo(lp);
      drawX = x;

    } else if(motionType === 'center-out') {
      // 중앙에서 바깥으로 — 중앙 선부터 등장
      const centerDist = Math.abs(x/W - 0.5) * 2;
      const delay = centerDist * 0.4;
      const lp = Math.max(0, Math.min(1, (p - delay*0) / 1));
      // 중앙 먼저: 중앙 가까울수록 일찍 등장
      const appear = Math.max(0, Math.min(1, (p - centerDist*0.35) / 0.65));
      drawW = w * easeOutExpo(appear);
      drawX = x;

    } else if(motionType === 'outside-in') {
      // 양끝에서 안으로 — 끝 선부터 등장
      const edgeDist = 1 - Math.abs(x/W - 0.5) * 2;
      const appear = Math.max(0, Math.min(1, (p - edgeDist*0.35) / 0.65));
      drawW = w * easeOutExpo(appear);
      drawX = x;

    } else if(motionType === 'side-in-lr') {
      // 좌에서 우로 슬라이드
      const appear = Math.max(0, Math.min(1, (p - (x/W)*0.4) / 0.6));
      drawW = w * easeOutExpo(appear);
      drawX = x;

    } else if(motionType === 'side-in-rl') {
      // 우에서 좌로 슬라이드
      const revX = 1 - x/W;
      const appear = Math.max(0, Math.min(1, (p - revX*0.4) / 0.6));
      drawW = w * easeOutExpo(appear);
      drawX = x;

    } else if(motionType === 'stagger') {
      // 시간차 등장
      const delay = (i / lines.length) * 0.6;
      const appear = Math.max(0, Math.min(1, (p - delay) / 0.4));
      drawW = w * easeOutExpo(appear);
      drawX = x;
    }

    if(drawW > 0) {
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(drawX - drawW/2), 0, Math.max(1, Math.ceil(drawW)), H);
    }
  });
}

// ── 애니메이션 컨트롤러 ───────────────────
function createAnimation(canvasId, bgColor, lines, motionType, duration=5000) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let animId = null;
  let startTime = null;
  let playing = false;
  const wrap = canvas.closest('.canvas-wrap');

  // 초기 프레임: 배경색
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,W,H);

  function tick(ts) {
    if(!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const total = duration;

    // 5초: 0~0.5s 페이드인, 0.5s~4.5s 그래픽, 4.5s~5s 페이드아웃
    let progress;
    const fadeIn  = 0.5/5;
    const fadeOut = 0.5/5;

    if(elapsed < 500) {
      // 페이드인: 배경만 → 0
      progress = 0;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0,0,W,H);
    } else if(elapsed < 4500) {
      // 그래픽 등장 구간
      progress = (elapsed - 500) / 4000;
      renderFrame(ctx,W,H,bgColor,lines,Math.min(progress, 0.999),motionType);
    } else if(elapsed < 5000) {
      // 페이드아웃: 그래픽 → 배경
      const fadeP = (elapsed - 4500) / 500;
      renderFrame(ctx,W,H,bgColor,lines,0.999,motionType);
      ctx.fillStyle = bgColor;
      ctx.globalAlpha = easeInExpo(fadeP);
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha = 1;
    } else {
      // 종료
      ctx.fillStyle = bgColor;
      ctx.fillRect(0,0,W,H);
      playing = false;
      wrap.classList.remove('playing');
      startTime = null;
      return;
    }

    animId = requestAnimationFrame(tick);
  }

  function play() {
    if(playing) return;
    playing = true;
    startTime = null;
    wrap.classList.add('playing');
    animId = requestAnimationFrame(tick);
  }

  wrap.addEventListener('click', play);
  // 버튼에도 연결
  const btn = wrap.querySelector('.play-btn');
  if(btn) btn.addEventListener('click', (e) => { e.stopPropagation(); play(); });
  return { play };
}

// 전역 애니메이션 맵
const animMap = {};

// ── 섹션 생성 ─────────────────────────────
const MOTIONS = [
  {
    id:'2', name:'Chaos', motion:'grow', label:'D · Grow',
    bgs:[{key:'white',hex:'#FFFFFF',cls:'bg-white'},{key:'navy',hex:'#202936',cls:'bg-navy'}],
    makeFn: makeChaos, seed:2001
  },
  {
    id:'3', name:'Focal', motion:'center-out', label:'B · Center-Out',
    bgs:[{key:'white',hex:'#FFFFFF',cls:'bg-white'},{key:'navy',hex:'#202936',cls:'bg-navy'}],
    makeFn: makeFocal, seed:3001
  },
  {
    id:'3b', name:'Anti-Focal', motion:'outside-in', label:'C · Outside-In',
    bgs:[{key:'white',hex:'#FFFFFF',cls:'bg-white'},{key:'navy',hex:'#202936',cls:'bg-navy'}],
    makeFn: makeAntiFocal, seed:7001
  },
  {
    id:'4a', name:'L→R', motion:'side-in-lr', label:'A · Side-In L→R',
    bgs:[{key:'white',hex:'#FFFFFF',cls:'bg-white'},{key:'navy',hex:'#202936',cls:'bg-navy'}],
    makeFn: makeL2R, seed:8001
  },
  {
    id:'4b', name:'R→L', motion:'side-in-rl', label:'A · Side-In R→L',
    bgs:[{key:'white',hex:'#FFFFFF',cls:'bg-white'},{key:'navy',hex:'#202936',cls:'bg-navy'}],
    makeFn: makeR2L, seed:9001
  },
  {
    id:'5a', name:'Solid-A', motion:'stagger', label:'E · Stagger',
    bgs:[{key:'solid',hex:'#FFFFFF',cls:'bg-white'}],
    makeFn:(W,s)=>makeSolid6Base(W,s,0.05,0.10), seed:5001, noFixColor:true
  },
  {
    id:'5b', name:'Solid-B', motion:'stagger', label:'E · Stagger',
    bgs:[{key:'solid',hex:'#FFFFFF',cls:'bg-white'}],
    makeFn:(W,s)=>makeSolid6Base(W,s+3333,0.07,0.15), seed:5001, noFixColor:true
  },
  {
    id:'5c', name:'Solid-C', motion:'stagger', label:'E · Stagger',
    bgs:[{key:'solid',hex:'#FFFFFF',cls:'bg-white'}],
    makeFn:(W,s)=>makeSolid6Base(W,s+7777,0.10,0.20), seed:5001, noFixColor:true
  },
];

function fixColor(col, bgKey) {
  if(bgKey==='white' && (col===C.white||col===C.navy1)) return C.navy2;
  if(bgKey==='navy'  && col===C.navy2) return C.purple;
  return col;
}

MOTIONS.forEach(type => {
  const section = document.createElement('div');
  section.className = 'section';
  section.innerHTML = `
    <div class="section-header">
      <div class="section-id">T${type.id}</div>
      <div class="section-title">${type.name}</div>
      <div class="section-motion">${type.label}</div>
    </div>
    <div class="section-divider"></div>
  `;

  type.bgs.forEach((bg, bi) => {
    const cid = `M_T${type.id}_${bi+1}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-meta">
        <div class="card-id">${cid}</div>
        <div class="card-bg">BG · ${bg.hex}</div>
      </div>
      <div class="canvas-wrap" id="wrap_${cid}">
        <canvas id="${cid}" width="1200" height="675"></canvas>
        <div class="canvas-overlay">
          <div class="ov-item">Motion<span>${type.label}</span></div>
          <div class="ov-div"></div>
          <div class="ov-item">Duration<span>5s</span></div>
          <div class="ov-div"></div>
          <div class="ov-item">BG<span>${bg.hex}</span></div>
        </div>
        <button class="play-btn">▶</button>
      </div>
    `;
    section.appendChild(card);

    setTimeout(() => {
      const rawLines = type.makeFn(1200, type.seed);
      const lines = type.noFixColor
        ? rawLines
        : rawLines.map(l => ({...l, color: fixColor(l.color, bg.key)}));
      createAnimation(cid, bg.hex, lines, type.motion);
    }, 100);
  });

  document.body.appendChild(section);
});
</script>
</body>
</html>
